services:
  - name: versus-backend
    type: web
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        value: mongodb://127.0.0.1:27017/?serverSelectionTimeoutMS=2000
      - key: DB_NAME
        value: versus
      - key: OPENAI_API_KEY
        sync: false
